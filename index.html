<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo-jappandal.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Jappandal Tech - Plateforme E-Commerce Multi-boutiques</title>
    <meta name="description" content="Propulsez votre boutique en ligne en Afrique de l'Ouest. Vos clients commandent en un clic, vous recevez tout sur WhatsApp. Gérable 100% sur mobile." />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">

    <!-- PWA / icône écran d'accueil mobile -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Jappandal" />
  </head>
  <body style="margin:0;background:#0f172a;">
    <div id="root">
      <!-- Loader instantané affiché avant le chargement de React (évite la page blanche) -->
      <div id="boot-loader" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0f172a;gap:18px;">
        <img src="/logo-jappandal.png" alt="Jappandal" style="height:48px;width:auto;object-fit:contain;" />
        <div style="width:28px;height:28px;border:3px solid #2563eb;border-top-color:transparent;border-radius:50%;animation:bootspin .8s linear infinite;"></div>
      </div>
      <style>@keyframes bootspin{to{transform:rotate(360deg)}}</style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
